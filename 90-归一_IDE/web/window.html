<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAO · FreeCAD 整窗归一</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1e1e1e;color:#d4d4d4;font:12px/1.4 "Segoe UI",system-ui,sans-serif;overflow:hidden}
#bar{position:fixed;top:0;left:0;right:0;height:26px;display:flex;align-items:center;gap:10px;
 padding:0 10px;background:#252526cc;border-bottom:1px solid #3c3c3c;z-index:10;backdrop-filter:blur(4px)}
#bar b{color:#4ec9b0}
#bar a{color:#3794ff;text-decoration:none}
#stat{margin-left:auto;color:#8a8a8a}
#stage{position:absolute;inset:26px 0 0 0;display:flex;align-items:center;justify-content:center;background:#111}
#frame{max-width:100%;max-height:100%;cursor:default;user-select:none;-webkit-user-drag:none;outline:none}
#off{position:absolute;inset:26px 0 0 0;display:none;align-items:center;justify-content:center;color:#f48771}
</style>
</head>
<body>
<div id="bar"><b>☯ FreeCAD 整窗归一</b>
 <span>软件本体已整体路由至此页 · 一切板块/菜单/对话框直接操作</span>
 <a href="index.html">⇄ 工作台模式</a>
 <span id="stat">连接中…</span></div>
<div id="stage"><img id="frame" tabindex="0" draggable="false" alt=""></div>
<div id="off">桥接离线 — 等待 FreeCAD…</div>

<script>
const B = location.origin;
const img = document.getElementById('frame');
const stat = document.getElementById('stat');
const off = document.getElementById('off');
let W = 0, H = 0, busy = false, alive = false, fps = 0, frames = 0;

async function pull(){
  if (busy) return; busy = true;
  try{
    const r = await fetch(B + '/window?fmt=jpg&q=72');
    const d = await r.json();
    if (d.ok){
      W = d.window_width; H = d.window_height;
      img.src = 'data:image/jpeg;base64,' + d.data;
      alive = true; frames++;
      off.style.display = 'none';
    }
  }catch(e){ alive = false; off.style.display = 'flex'; }
  busy = false;
}
setInterval(pull, 120); pull();
setInterval(()=>{ fps = frames; frames = 0;
  stat.textContent = alive ? `在线 · ${W}×${H} · ${fps}fps` : '离线'; }, 1000);

function map(ev){
  const r = img.getBoundingClientRect();
  return { x: Math.round((ev.clientX - r.left) * W / r.width),
           y: Math.round((ev.clientY - r.top) * H / r.height) };
}
function mods(ev){
  const m = [];
  if (ev.ctrlKey) m.push('ctrl');
  if (ev.shiftKey) m.push('shift');
  if (ev.altKey) m.push('alt');
  if (ev.metaKey) m.push('meta');
  return m;
}
function send(o){ fetch(B + '/input', {method:'POST', body: JSON.stringify(o)}).catch(()=>{}); }
const BTN = {0:'left', 1:'middle', 2:'right'};

let lastMove = 0;
img.addEventListener('mousemove', ev => {
  const now = Date.now();
  if (now - lastMove < 40) return;
  lastMove = now;
  const p = map(ev);
  send({type:'mouse_move', x:p.x, y:p.y, modifiers:mods(ev)});
});
img.addEventListener('mousedown', ev => {
  ev.preventDefault(); img.focus();
  const p = map(ev);
  send({type:'mouse_down', x:p.x, y:p.y, button:BTN[ev.button]||'left', modifiers:mods(ev)});
});
img.addEventListener('mouseup', ev => {
  ev.preventDefault();
  const p = map(ev);
  send({type:'mouse_up', x:p.x, y:p.y, button:BTN[ev.button]||'left', modifiers:mods(ev)});
});
img.addEventListener('dblclick', ev => {
  ev.preventDefault();
  const p = map(ev);
  send({type:'dblclick', x:p.x, y:p.y, button:BTN[ev.button]||'left', modifiers:mods(ev)});
});
img.addEventListener('contextmenu', ev => ev.preventDefault());
img.addEventListener('wheel', ev => {
  ev.preventDefault();
  const p = map(ev);
  send({type:'wheel', x:p.x, y:p.y, delta: ev.deltaY < 0 ? 120 : -120, modifiers:mods(ev)});
}, {passive:false});

const SPECIAL = {Enter:'Return', Tab:'Tab', Escape:'Escape', Backspace:'Backspace',
  Delete:'Delete', ArrowUp:'Up', ArrowDown:'Down', ArrowLeft:'Left', ArrowRight:'Right',
  Home:'Home', End:'End', PageUp:'PageUp', PageDown:'PageDown', ' ':'Space', F1:'F1'};
img.addEventListener('keydown', ev => {
  ev.preventDefault();
  if (ev.key.length === 1 && !ev.ctrlKey && !ev.altKey && !ev.metaKey){
    send({type:'text', text: ev.key});
    return;
  }
  const key = SPECIAL[ev.key] || ev.key;
  send({type:'key_down', key, modifiers:mods(ev)});
});
img.addEventListener('keyup', ev => {
  ev.preventDefault();
  if (ev.key.length === 1 && !ev.ctrlKey && !ev.altKey && !ev.metaKey) return;
  const key = SPECIAL[ev.key] || ev.key;
  send({type:'key_up', key, modifiers:mods(ev)});
});
</script>
</body>
</html>
