name: closed-loop-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  closure:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cold-start deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: "Gate S - single-source: embedded copies match canonical (zero drift)"
        run: python scripts/sync_embedded.py --check

      - name: "Gate 0 - dao_kernel full self-verify + dao_audit minimal closure (OCP)"
        run: |
          pip install cadquery-ocp trimesh
          python "30-验证_Verify/_核审_ci.py"

      - name: "Gate 0b - Sketcher reverse (FCStd sketch -> ops, pure python)"
        run: python -m pytest tests/test_fc_reverse_sketch.py -v

      - name: "Gate 1 - universal 8-dimension verifier (self-demo + tests)"
        run: |
          python "80-实践_Practice/verifier.py"
          python -m pytest "80-实践_Practice/tests/test_verifier.py" -v

      - name: "Gate 2 - self-heal closed loop converges to full pass"
        run: |
          python "80-实践_Practice/self_heal.py"
          python -m pytest "80-实践_Practice/tests/test_self_heal.py" -v

      - name: "Gate 3 - SR6 true-3D FK/IK closure residual ~ 0"
        run: |
          python -m pytest "60-实战_Projects/ORS6_Stewart/closed_loop/tests/test_closure.py" -v

      - name: "Gate 3b - generate SR6 closure report (json + figure)"
        working-directory: "60-实战_Projects/ORS6_Stewart/closed_loop"
        run: python closure_report.py

      - name: "Gate 4 - SR6 physical-assembly closure (links = 175/186mm exact)"
        run: |
          python "60-实战_Projects/ORS6_Stewart/closed_loop/assembly/verify_assembly.py"
          python -m pytest "60-实战_Projects/ORS6_Stewart/closed_loop/tests/test_assembly.py" -v

      - name: "Gate 5 - SR6 TRUTH backend verification (firmware port + rigid FK + PDF motion spec)"
        run: |
          python "60-实战_Projects/ORS6_Stewart/sr6_truth/validate.py"
          python -m pytest "60-实战_Projects/ORS6_Stewart/sr6_truth/tests/test_truth.py" -v
          cp "60-实战_Projects/ORS6_Stewart/sr6_truth/report.json" docs/models/verify_report.json

      - name: "Gate 6 - SR6 full-machine assembly poses + L5 mesh validation"
        run: |
          pip install trimesh networkx python-fcl
          python "80-装配_Assembly/anchors/sr6/solve_home_poses.py"
          python "80-装配_Assembly/anchors/sr6/validate_home.py"

      - name: Upload SR6 closure artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sr6-closure-report
          path: "60-实战_Projects/ORS6_Stewart/closed_loop/out/"
          if-no-files-found: warn

  freecad-real:
    # 实机 FreeCAD 门: ubuntu-latest apt FreeCAD (1.x 系) 上跑核心建模/装配/反演回归,
    # 与 VM 的 FreeCAD 0.19 形成双版本覆盖。
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v7

      - name: Install FreeCAD + FEM toolchain (apt)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq freecad gmsh calculix-ccx
          freecadcmd --version

      - name: Install python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: "Gate F - real-FreeCAD regression (integration + reverse/diff/dag)"
        run: |
          python3 -m pytest tests/test_integration.py tests/test_fc_reverse_sketch.py \
            tests/test_fc_reverse_sketch_ext.py tests/test_fc_diff.py tests/test_fc_dag.py -v
