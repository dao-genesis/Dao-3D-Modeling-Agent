name: Auto-merge clean PRs

# 道法自然 · 无为而无不为：无冲突的 PR 自动合并，有冲突的留待人工解决。
# 触发：PR 开启/更新/重开/转就绪 时自动判定；定时扫描兜底（每 6 小时），
# 确保滞留的可合并 PR 不依赖任何人工触发；亦可手动 workflow_dispatch。
# 若配置了 DAO_PAT 密钥，则用它合并（可合入改动 .github/workflows/ 的 PR，
# 如 dependabot 的 action 升级）；否则回退到 GITHUB_TOKEN。

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || 'sweep' }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Merge mergeable PR(s)
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DAO_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let numbers = [];
            if (context.eventName !== 'pull_request_target') {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'open', per_page: 100,
              });
              numbers = prs
                .filter(p => !p.draft && p.head.repo && p.head.repo.full_name === `${owner}/${repo}`)
                .map(p => p.number);
            } else {
              numbers = [context.payload.pull_request.number];
            }

            for (const number of numbers) {
              let pr = null;
              for (let i = 0; i < 10; i++) {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: number })).data;
                if (pr.mergeable !== null) break;
                await new Promise(r => setTimeout(r, 4000));
              }
              if (!pr || pr.state !== 'open') { core.info(`#${number}: not open, skip`); continue; }
              if (pr.draft) { core.info(`#${number}: draft, skip`); continue; }
              if (pr.mergeable === false) { core.info(`#${number}: has conflicts, leaving for manual resolution`); continue; }
              if (pr.mergeable !== true) { core.info(`#${number}: mergeability still unknown, skip this run`); continue; }
              // CI 未全绿不合并: 任一 check-run 失败/未完成即跳过 (定时扫描会兜底重试)。
              // 排除自动合并家族自身的 check, 避免自锁。
              const SELF = /auto-?merge|dao-auto|auto-label|自动合并|自动打标/i;
              const runs = await github.paginate(github.rest.checks.listForRef, {
                owner, repo, ref: pr.head.sha, per_page: 100,
              });
              const relevant = runs.filter(r => !SELF.test(r.name));
              const pending = relevant.filter(r => r.status !== 'completed');
              const failed = relevant.filter(r => r.status === 'completed' &&
                !['success', 'neutral', 'skipped'].includes(r.conclusion));
              if (failed.length) {
                core.info(`#${number}: failing checks [${failed.map(r => r.name).join(', ')}], skip`);
                continue;
              }
              if (pending.length) {
                core.info(`#${number}: checks still running [${pending.map(r => r.name).join(', ')}], skip this run`);
                continue;
              }
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: number, merge_method: 'merge' });
                core.notice(`#${number}: merged`);
              } catch (e) {
                core.warning(`#${number}: merge failed (${e.status}) ${e.message}`);
              }
            }